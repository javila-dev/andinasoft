{%extends 'base.html'%}
{%load crispy_forms_tags%}
{%block title%}Accounting | Radicar factura{%endblock%}
{%block js%}
{%include 'datepicker_gigjo.html'%}
{%endblock%}
{%block content%}
<div class='principal-container bg-light shadow-lg rounded'>
    <h3 class='section-title text-white text-center'>
        Radicar facturas
        </h3>
    <div class='row justify-content-center mx-0 pt-3 pb-4'>
        <div class='col-md-8 bg-white shadow rounded py-3'>
            {%crispy form%}
        </div>
    </div>
</div>
<script>
    $(document).ready(function(){
        $('#id_id_tercero').on('change',function(){
            var tercero = $(this).val()
            $.ajax({
                type:'GET',
                url:'/accounting/ajax/matchsupplier',
                data:{
                    'tercero':tercero
                },
                success:function(response){
                    var name = response['nombre']
                    $('#id_nombre_tercero').val(name)
                }
            })
        })
    })
</script>
{%endblock%}
