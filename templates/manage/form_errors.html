<div class='position-absolute' style='right: 0; width: 450px;z-index: 1;'>
    {% if form.errors|length > 0 %}
    <div class="alert alert-danger alert-dismissible fade show shadow-lg mt-2" role="alert">
      <strong>Revisa los siguientes errores:</strong>{%for field in form%}
        {{ field.errors }}
        {%endfor%}<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {%endif%}
</div>
