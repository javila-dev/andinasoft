<div class="modal fade" id="avatarModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="exampleModalLabel">Selecciona tu Avatar</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <div id='avatarList' class='row'>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
      $(document).ready(function(){
        $('#avatarModal').on('show.bs.modal',function(event){
            $('#avatarList').children().remove()
            $.ajax({
            url:'/ajax/getavatars',
            type:'GET',
            data:{},
            success:function(response){
                data = JSON.parse(response['avatars'])
                for (let i in data){
                    var href = '/user/change_avatar/'+data[i]['fields']['name']
                    var src = '/media/'+data[i]['fields']['image']
                    var avatar = "<div class='col-3'>"+
                        "<a href='"+href+"'>"+
                        "<img src='"+src+"' class='img-thumbnail rounded-circle' width='160' height='160'>"+
                        "</a>"+
                        "</div>"
                    $('#avatarList').append(avatar)
                }
            }
          }
          )
        })
      })
  </script>
