{%load static%}
<div class="modal fade" id="avatarModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="exampleModalLabel">Selecciona tu Avatar</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <div id='avatarList' class='row'>
          </div>
        </div>
      </div>
    </div>
  </div>
<script>
    function resolveMediaUrl(pathOrUrl) {
        if (!pathOrUrl) return '';
        if (pathOrUrl.startsWith('http://') || pathOrUrl.startsWith('https://')) return pathOrUrl;
        return '{% get_media_prefix %}' + pathOrUrl.replace(/^\/+/, '');
    }

    $(document).ready(function(){
        $('#avatarModal').on('show.bs.modal',function(event){
            $('#avatarList').children().remove()
            $.ajax({
            url:'/ajax/getavatars',
            type:'GET',
            data:{},
            success:function(response){
                const data = Array.isArray(response['avatars']) ? response['avatars'] : JSON.parse(response['avatars'] || '[]')
                for (let i in data){
                    const avatar = data[i]
                    var href = '/user/change_avatar/'+(avatar.name || avatar.fields?.name)
                    var src = avatar.image_url || resolveMediaUrl(avatar.image || avatar.fields?.image)
                    var avatarHtml = "<div class='col-3'>"+
                        "<a href='"+href+"'>"+
                        "<img src='"+src+"' class='img-thumbnail rounded-circle' width='160' height='160'>"+
                        "</a>"+
                        "</div>"
                    $('#avatarList').append(avatarHtml)
                }
            }
          }
          )
        })
      })
  </script>
