<div class="modal fade" id="modalItemsRecibir" data-backdrop="static" data-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="staticBackdropLabel"><i class="fas fa-hand-pointer"></i>&nbsp;Selecciona el producto o servicio a recibir</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <div class='table-responsive'>
              <table id='tablaProductos' class='display' style='width: 100%;'>
                <thead>
                    <tr>
                        <th class='text-center'>Id</th>
                        <th class='text-center'>Descripcion</th>
                        <th class='text-center'>Unidad</th>
                        <th class='text-center'>Tipo</th>
                        <th class='text-center'>Valor</th>
                        <th class='text-center'>Contratado</th>
                        <th class='text-center'>Recibido</th>
                    </tr>
                </thead>
                <tbody>
                    {%for item in items_contrato%}
                    <tr>
                        <td class='text-center'>{{item.pk}}</td>
                        <td>{{item.item.nombre}}</td>
                        <td class='text-center'>{{item.item.unidad}}</td>
                        <td class='text-center'>{{item.item.tipo}}</td>
                        <td class='text-center'>{{item.valor}}</td>
                        <td class='text-center'>{{item.contratados}}</td>
                        <td class='text-center'>{{item.recibidos|default_if_none:0}}</td>
                    </tr>
                    {%endfor%}
                </tbody>
              </table>
          </div>
        </div>
      </div>
    </div>
  </div>
