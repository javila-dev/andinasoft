<style>
#tablaProductos td{
  font-size: small;
}
</style>
<div class="modal fade" id="modalProductos" data-backdrop="static" data-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="staticBackdropLabel"><i class="fas fa-hand-pointer"></i>&nbsp;Selecciona el producto o servicio</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <input type='text' id='obraAsignar' hidden>
          <div class='table-responsive'>
              <table id='tablaProductos' class='display' style='width: 100%;'>
                <thead>
                    <tr>
                        <th class='text-center'>Id</th>
                        <th class='text-center'>Descripcion</th>
                        <th class='text-center'>Unidad</th>
                        <th class='text-center'>Tipo</th>
                    </tr>
                </thead>
              </table>
          </div>
        </div>
      </div>
    </div>
  </div>
