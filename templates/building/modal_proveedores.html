<div class="modal fade" id="modalProveedores" data-backdrop="static" data-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="staticBackdropLabel"><i class="fas fa-user-tie"></i>&nbsp;Selecciona el proveedor</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <div class='table-responsive'>
              <table id='tablaProveedores' class='display' style='width: 100%;'>
                <thead>
                    <tr>
                        <th class='text-center'>Nit</th>
                        <th class='text-center'>Nombre</th>
                        <th class='text-center'>Telefono</th>
                    </tr>
                </thead>
                <tbody>
                    {%for proveedor in proveedores%}
                    <tr>
                        <td class='text-center'>{{proveedor.pk}}</td>
                        <td>{{proveedor.nombre}}</td>
                        <td class='text-center'>{{proveedor.telefono}}</td>
                    </tr>
                    {%endfor%}
                </tbody>
              </table>
          </div>
        </div>
      </div>
    </div>
  </div>
