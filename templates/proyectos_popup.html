{%extends 'base.html'%}
{%load crispy_forms_tags%}
{%load static%}

{%block title%}Selecciona un Proyecto{%endblock%}

{%block content%}
<div class="modal fade" id="select-proyecto" data-backdrop="static" data-keyboard="false" tabindex="-1" role="dialog" aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog modal-md">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="staticBackdropLabel">Seleccionar Proyecto</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
            <div class="row">
              {% for proyecto in proyectos %}
                <div class="col-6 col-md-4 mb-3 text-center{% if not proyecto.activo %} d-none proyecto-oculto{% endif %}">
                  <a href="/{{redireccion}}/{{proyecto.nombre|urlencode}}" class="text-decoration-none text-dark">
                    {% if proyecto.logo %}
                      <img src="{% static proyecto.logo %}" class="img-fluid proyecto-logo" alt="{{proyecto.nombre}}">
                    {% endif %}
                  </a>
                </div>
              {% empty %}
                <div class="col-12 text-center text-muted">
                  No hay proyectos activos para mostrar.
                </div>
              {% endfor %}
            </div>
        </div>
        <div class="modal-footer">
          <button type="button" id="toggle-ocultos" class="btn btn-sm btn-outline-secondary">Ver ocultos</button>
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>
  <style>
      .proyecto-logo {
        max-height: 95px;
        width: auto;
        object-fit: contain;
      }
  </style>
  <script>
      $('#select-proyecto').modal('show')
      $('#select-proyecto').on('hide.bs.modal',function(e){
        window.location.href='/welcome'
      })

      $('#toggle-ocultos').on('click', function () {
        $('.proyecto-oculto').toggleClass('d-none')
        $(this).text($('.proyecto-oculto.d-none').length ? 'Ver ocultos' : 'Ocultar ocultos')
      })
  </script>
{%endblock%}
