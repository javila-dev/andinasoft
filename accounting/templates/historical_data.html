{%extends 'base.html'%}{%load static%}{%load crispy_forms_tags%}
{%block content%}
<div class='principal-container bg-light shadow-lg rounded pb-2'>
    <div class="mx-auto" style="width: 160px;">
      <lord-icon
          src="https://cdn.lordicon.com/yyecauzv.json"
          trigger="boomerang"
          colors="primary:#121331,secondary:#08a88a"
          state="hover-2"
          style="width:100px;height:100px">
      </lord-icon>
      </div>
      <h3 class="text-center">Archivo contable historico</h3>
      <div class="container mt-3 col-md-5">
        {%crispy form %}
      </div>
      <div class="table-responsive">
        <table id="table_archivo" style="width: 100%;" class="table table-sm table-hover mt-3">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Empresa</th>
                    <th>Documento</th>
                    <th>Consecutivo</th>
                    <th>Usuario carga</th>
                    <th>Fecha Carga</th>
                </tr>
            </thead>
        </table>
      </div>    
</div>
{%endblock%}
{%block js%}
{%include 'datepicker_gigjo.html'%}
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>
<script src='{%static "js/jquery.mask.js"%}'></script>
<script src="{%static 'js/fstdropdown.js'%}"></script>
<script type="text/javascript" language="javascript" src="{%static 'js/get_csrf.js'%}"></script>
<script src='https://cdn.jsdelivr.net/npm/bs-custom-file-input/dist/bs-custom-file-input.min.js'></script>
<script>
    $(document).ready(function(){
      bsCustomFileInput.init();
      $('.money').mask("#,##0", {reverse: true});  
      $('.mask').mask("S-099");  
      $('#form-hist-account-data').submit(function(){
        $('button').prop('disabled',true)
        $('#submit-id-cargar-doc')
        .addClass('disabled')
        .val('Cargando...')
      })
      var table_archivo = $("#table_archivo").DataTable({
          processing:true,
          serverSide: true,
          language:{
              url:'/ajax_request/datatable_spanish'
          },
          ajax:{
              url:window.location,
              dataSrc:"data"
          },
          columns:[
              {'data':'fecha_doc'},
              {'data':'empresa.nombre'},
              {'data':'tipo_doc'},
              {'data':'consecutivo'},
              {'data':'user_carga.username'},
              {'data':'fecha_carga'},
          ],
      })
      $("#table_archivo tbody").on('click','tr',function(){
        let row = table_archivo.row(this).data()
        let params = `status=no,location=no,toolbar=no,menubar=no,
                width=700,height=550,left=100,top=100`
        window.open('/media/'+row.document,'Soporte documento',params)
        
      })
      $('#btn-search').click(function(){
        
        let empresa = $('#id_empresa').val()
        let doc = $('#id_tipo_doc').val()
        let consec = $('#id_consecutivo_doc').val()

        let url = window.location +`?empresa=${empresa}&tipo_doc=${doc}&consecutivo=${consec}`
        $('button').prop('disabled',true)
        table_archivo.ajax.url(url).load(function(){
          $('button').prop('disabled',false)
        })

      })
    })
</script>
{%endblock%}
{%block style%}
<link rel="stylesheet" href="{%static 'css/fstdropdown.css'%}">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<style>
    th, td{
        text-align: center;
    }

    tbody {
        cursor: pointer;
    }
    td {
      font-size: x-small;
    }
    .fs-small{
      font-size: small;
    }
    .uppercase {
      text-transform: uppercase;
    }
</style>
{%endblock%}
