version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: gunicorn andina.wsgi:application --bind 0.0.0.0:8000 --workers 3
    restart: always
    env_file:
      - .env
    volumes:
      - media_data:/code/static_media
    networks:
      - andina_backend

  nginx:
    image: nginx:alpine
    restart: always
    expose:
      - "80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/code/static_media
    depends_on:
      - web
    networks:
      - andina_backend

volumes:
  media_data:

networks:
  andina_backend:
    external: true
