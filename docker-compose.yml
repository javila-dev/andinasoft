version: '3.8'

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      # Le decimos a Django que el host de la BD es el nombre del servicio
      - DB_HOST=db 

  db:
    image: mysql:8.0
    container_name: mysql_multi_db
    # Este comando es importante para compatibilidad con versiones antiguas de drivers de cliente
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword  # Contraseña para el usuario root (cámbiala si quieres)
      MYSQL_DATABASE: developer_web      # Esta es la DB 'default'
      MYSQL_USER: developer_admin        # Tu usuario del settings
      MYSQL_PASSWORD: uGuQIm8jGHlOYqtI   # Tu contraseña del settings
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql           # Para que los datos persistan
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql # Carga el script de las otras DBs

volumes:
  db_data: